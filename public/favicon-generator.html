<!DOCTYPE html>
<html>
<head>
    <title>Lost & Found Favicon Generator</title>
</head>
<body>
    <canvas id="canvas" width="180" height="180"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Gradient background
        const gradient = ctx.createLinearGradient(0, 0, 180, 180);
        gradient.addColorStop(0, '#3b82f6');
        gradient.addColorStop(1, '#8b5cf6');
        
        // Background circle
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(90, 90, 85, 0, Math.PI * 2);
        ctx.fill();
        
        // Inner circle for contrast
        ctx.globalAlpha = 0.95;
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(90, 90, 80, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        
        // Search magnifying glass
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        // Magnifying glass circle (offset to left-top)
        ctx.beginPath();
        ctx.arc(55, 55, 28, 0, Math.PI * 2);
        ctx.stroke();
        
        // Handle
        ctx.beginPath();
        ctx.moveTo(75, 75);
        ctx.lineTo(90, 90);
        ctx.stroke();
        
        // Center dot
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(55, 55, 6, 0, Math.PI * 2);
        ctx.fill();
        
        // Rings for search
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(55, 55, 16, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        
        // Plus sign for add
        ctx.lineWidth = 3;
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.moveTo(112, 55);
        ctx.lineTo(128, 55);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(120, 47);
        ctx.lineTo(120, 63);
        ctx.stroke();
        
        // Check mark for success
        ctx.beginPath();
        ctx.moveTo(110, 130);
        ctx.lineTo(118, 138);
        ctx.lineTo(130, 116);
        ctx.stroke();
        
        // Decorative dots
        ctx.fillStyle = 'white';
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.arc(60, 100, 3, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(120, 100, 3, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(60, 130, 3, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(120, 130, 3, 0, Math.PI * 2);
        ctx.fill();
    </script>
</body>
</html>
