name: CI/CD Frontend

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verificar se existe script de teste
        id: has_tests
        run: |
          node -e "const p=require('./package.json'); process.stdout.write(p?.scripts?.test ? 'true' : 'false')" > has_tests.txt
          echo "value=$(cat has_tests.txt)" >> "$GITHUB_OUTPUT"

      - name: Executar testes
        if: steps.has_tests.outputs.value == 'true'
        run: npm run test -- --run

      - name: Pular testes (script não encontrado)
        if: steps.has_tests.outputs.value != 'true'
        run: echo "Nenhum script de teste encontrado no package.json."

  cd:
    name: CD (artifact de produção)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build

      - name: Empacotar artefato
        run: |
          mkdir -p dist
          cp -r .next dist/.next
          cp package.json dist/package.json
          cp package-lock.json dist/package-lock.json
          if [ -d public ]; then cp -r public dist/public; fi

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: dist
          retention-days: 7
